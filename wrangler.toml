name = "ikol"
main = "dist/index.js"
compatibility_date = "2024-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "ikol-db"
database_id = "7afab1d3-e2cf-45a3-8a3f-31a549e13d29"

# KV Storage
[[kv_namespaces]]
binding = "KV"
id = "fb84b43d28c34ee6bf66a780d254a0a4"

# Build configuration
[build]
command = "npm run build"

# Dev server
[dev]
port = 8787
local_protocol = "http"

# Environment-specific bindings
[env.production]
name = "ikol-bot-prod"

[env.staging]
name = "ikol-bot-staging"
